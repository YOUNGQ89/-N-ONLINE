<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>X-EPOXY CHÍ NGUYỄN</title>
<section class="banner">
  <div class="banner-content">
    <h1>Thi công sơn epoxy chuyên nghiệp</h1>
    <p>Uy tín - Nhanh chóng - Giá tốt</p>
  </div>
</section>
<style>
body {
  margin:0;
  font-family: Arial;
}

/* HEADER */
header {
  background: orange;
  color: white;
  padding: 20px;
  text-align: center;
  font-size: 24px;
  font-weight: bold;
}

/* BANNER */
.banner {
  background: url("images/banner.jpg") center/cover no-repeat;
  height: 400px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  color: white;
}

.banner::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.banner-content {
  position: relative;
  text-align: center;
}

.banner h1 {
  font-size: 40px;
}

.banner p {
  font-size: 18px;
}

/* SERVICES */
.services {
  padding: 50px;
  text-align: center;
}

/* GRID ẢNH */
.grid {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.grid img {
  width: 220px;
  height: 150px;
  object-fit: cover;
  border-radius: 10px;
  transition: 0.3s;
}

.grid img:hover {
  transform: scale(1.05);
}

/* CONTACT */
.contact {
  background: #222;
  color: white;
  padding: 50px;
  text-align: center;
}

button {
  padding: 12px 25px;
  background: green;
  color: white;
  border: none;
  font-size: 18px;
  border-radius: 5px;
  cursor: pointer;
}

/* NÚT GỌI NỔI */
.call-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: red;
  color: white;
  padding: 15px;
  border-radius: 50%;
  text-decoration: none;
  font-size: 20px;
}
.item p {
  margin-top: 10px;
  font-weight: bold;
  color: #fff;
  text-shadow: 
    0 0 5px #ff9900,
    0 0 10px #ff6600,
    0 0 20px #ff3300;
}
</style>

</head>

<body>

<header>X-EPOXY</header>

<section class="banner">
  <h1>Thi công sơn epoxy chuyên nghiệp</h1>
  <p>Nhà xưởng - Tầng hầm - Sân thể thao</p>
</section>

<section class="services">
  <h2>Dịch vụ</h2>

  <div class="grid">
    <img src="images/a.jpg">
	<p>Sơn Epoxy</p>
    <img src="images/sonpu.jpg">
	<p>Sơn PU</p>
    <img src="images/chongtham.jpg">
	<p>Chống thấm</p>
  </div>
</section>

<section class="contact">
  <h2>Liên hệ ngay</h2>
  <p>📞 Hotline: <b>0909 123 456</b></p>

  <a href="tel:0909123456">
    <button>📞 Gọi ngay</button>
  </a>
</section>

<!-- NÚT GỌI NỔI -->
<a href="tel:0909123456" class="call-btn">📞</a>

</body>
</html>
